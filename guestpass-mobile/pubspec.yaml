name: guestpass_mobile
description: "GuestPass - Aplikasi manajemen tamu event dengan QR Code check-in"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # HTTP & Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.0

  # Storage
  flutter_secure_storage: ^9.2.4

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
